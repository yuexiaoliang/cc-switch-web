name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,      target: linux-x86_64,    artifact: cc-switch-mini-linux-x86_64.tar.xz,    label: Linux x86_64 }
          - { os: ubuntu-22.04-arm, target: linux-aarch64,   artifact: cc-switch-mini-linux-aarch64.tar.xz,   label: Linux ARM64 }
          - { os: macos-14,         target: macos-x86_64,    artifact: cc-switch-mini-macos-x86_64.tar.xz,    label: macOS x86_64 }
          - { os: macos-14,         target: macos-aarch64,   artifact: cc-switch-mini-macos-aarch64.tar.xz,   label: macOS ARM64 }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm run build:renderer

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-ccsm-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'package.json') }}
          restore-keys: ${{ runner.os }}-ccsm-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release -p cc-switch-mini-server --bin cc-switch-mini

      - name: Stage artifact directory
        run: |
          mkdir -p release-stage/cc-switch-mini
          cp target/release/cc-switch-mini release-stage/cc-switch-mini/
          # README + LICENSE so the install layout is self-documenting.
          cp README.md release-stage/cc-switch-mini/
          cp LICENSE  release-stage/cc-switch-mini/ 2>/dev/null || true
          # CHANGELOG excerpt is best-effort.
          cp CHANGELOG.md release-stage/cc-switch-mini/ 2>/dev/null || true
          ls -la release-stage/cc-switch-mini

      - name: Compress tarball
        run: |
          mkdir -p release-assets
          tar -C release-stage -cJf "release-assets/${{ matrix.artifact }}" cc-switch-mini
          ls -la release-assets

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: release-assets/${{ matrix.artifact }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: dist-artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist-artifacts

      - name: Generate SHA256SUMS
        run: |
          cd dist-artifacts
          # Sort so the manifest is stable across runs.
          (find . -maxdepth 1 -type f -name "*.tar.xz" -printf "%f\n" | sort) \
            | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS
          path: dist-artifacts/SHA256SUMS

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: cc-switch-mini ${{ github.ref_name }}
          prerelease: true
          body: |
            ## cc-switch-mini ${{ github.ref_name }}

            Headless Web derivative of [cc-switch](https://github.com/farion1231/cc-switch).
            Run on a server with no GUI and open the Web UI in any modern browser.

            ### Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/yuexiaoliang/cc-switch-mini/main/.ccsm/scripts/install.sh | sh
            ```

            The one-liner downloads the matching tarball, verifies the SHA-256
            against `SHA256SUMS`, and drops `cc-switch-mini` into `/usr/local/bin`.

            ### Quick start

            ```sh
            cc-switch-mini                                  # serves on 127.0.0.1:3000
            ssh -L 3000:localhost:3000 user@host             # tunnel from your laptop
            open http://localhost:3000                        # open in any browser
            ```

            ### Files

            - `cc-switch-mini-linux-x86_64.tar.xz` ˇŞ Linux x86_64
            - `cc-switch-mini-linux-aarch64.tar.xz` ˇŞ Linux ARM64
            - `cc-switch-mini-macos-x86_64.tar.xz` ˇŞ macOS Intel
            - `cc-switch-mini-macos-aarch64.tar.xz` ˇŞ macOS Apple Silicon
            - `SHA256SUMS` ˇŞ checksums for every tarball above

            See `.ccsm/DEVELOPMENT.md` in the repo for the full
            architecture, CLI flags, and sync strategy.
          files: |
            dist-artifacts/*.tar.xz
            dist-artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
