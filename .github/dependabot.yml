version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    groups:
      frontend-deps:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
    groups:
      upstream-cargo-deps:
        patterns:
          - "*"

  # cc-switch-mini server crate - lives outside src-tauri/ so
  # dependabot does not pick it up via the wildcard above.
  - package-ecosystem: "cargo"
    directory: "/.ccsm/server"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "cc-switch-mini"
    commit-message:
      prefix: "chore(deps)"
    groups:
      cc-switch-mini-server-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "actions"
    commit-message:
      prefix: "chore(deps)"
